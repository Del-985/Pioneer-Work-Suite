name: Backend P0

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://validation:validation@127.0.0.1:5432/validation
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter pioneer-student-api exec prisma validate
      - run: pnpm check:architecture
      - run: pnpm --filter pioneer-student-web test
      - run: pnpm --filter pioneer-student-api test
      - run: pnpm --filter pioneer-student-web build

name: Release Pioneer Work Suite

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        shell: pwsh
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install web dependencies
        working-directory: apps/web
        shell: pwsh
        run: yarn install --frozen-lockfile

      - name: Install desktop dependencies
        working-directory: desktop
        shell: pwsh
        run: yarn install --frozen-lockfile

      - name: Inspect Tauri configuration
        shell: pwsh
        run: |
          Write-Host "Repository root:"
          Get-Location

          Write-Host "`nTauri configs found:"
          Get-ChildItem -Path . -Recurse -Filter tauri.conf.json |
            Select-Object -ExpandProperty FullName

          Write-Host "`nDesktop config:"
          Get-Content ./desktop/src-tauri/tauri.conf.json

          Write-Host "`nDesktop package:"
          Get-Content ./desktop/package.json

          Write-Host "`nDesktop Cargo manifest:"
          Get-Content ./desktop/src-tauri/Cargo.toml

      - name: Build and publish signed Windows release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./desktop
          tauriScript: yarn tauri
          tagName: v__VERSION__
          releaseName: Pioneer Work Suite v__VERSION__
          releaseBody: Desktop release with updater support.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true

name: Release Pioneer Work Suite

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        shell: pwsh
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install web dependencies
        working-directory: apps/web
        shell: pwsh
        run: yarn install --frozen-lockfile

      - name: Install desktop dependencies
        working-directory: desktop
        shell: pwsh
        run: yarn install --frozen-lockfile

      - name: Synchronize release version
        shell: pwsh
        run: node ./scripts/sync-version.mjs

      - name: Verify synchronized version
        shell: pwsh
        run: |
          Write-Host "Web package version:"
          Get-Content ./apps/web/package.json | Select-String '"version"'

          Write-Host "`nDesktop package version:"
          Get-Content ./desktop/package.json | Select-String '"version"'

          Write-Host "`nCargo package version:"
          Get-Content ./desktop/src-tauri/Cargo.toml | Select-String '^version\s*='

          Write-Host "`nTauri package version:"
          Get-Content ./desktop/src-tauri/tauri.conf.json | Select-String '"version"'

      - name: Verify updater signing inputs
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_PRIVATE_KEY)) {
            throw "TAURI_PRIVATE_KEY is empty. Check TAURI_SIGNING_PRIVATE_KEY."
          }

          Write-Host "TAURI_PRIVATE_KEY is present."
          Write-Host "Private key character count: $($env:TAURI_PRIVATE_KEY.Length)"

          if ([string]::IsNullOrWhiteSpace($env:TAURI_KEY_PASSWORD)) {
            throw "TAURI_KEY_PASSWORD is empty. Check TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
          }

          Write-Host "TAURI_KEY_PASSWORD is present."

      - name: Build and publish signed Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./desktop
          tauriScript: yarn tauri
          args: --verbose
          tagName: v__VERSION__
          releaseName: Pioneer Work Suite v__VERSION__
          releaseBody: Desktop release with updater support.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Inspect built updater files
        if: always()
        shell: pwsh
        run: |
          Write-Host "All bundle files found:"
          Get-ChildItem `
            ./desktop/src-tauri/target/release/bundle `
            -Recurse `
            -File |
            Select-Object FullName, Length
